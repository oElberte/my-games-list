name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  FLUTTER_VERSION: 3.35.4

jobs:
  analyze-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Provision .env (Flutter asset; real config comes from --dart-define)
        run: cp .env.example .env
      - name: Install dependencies
        run: flutter pub get
      - name: Verify l10n is up to date
        run: |
          flutter gen-l10n
          git diff --exit-code lib/l10n
      - name: Format check
        run: dart format --output=none --set-exit-if-changed lib test
      - name: Analyze
        run: flutter analyze
      - name: Check for hardcoded strings
        run: bash tool/check_hardcoded_strings.sh
      - name: Test with coverage
        run: flutter test --coverage
      - name: Enforce coverage threshold
        run: |
          MIN=38
          HIT=$(grep '^DA:' coverage/lcov.info | awk -F, '$2>0{c++} END{print c+0}')
          TOTAL=$(grep -c '^DA:' coverage/lcov.info)
          PCT=$(awk "BEGIN{printf \"%.1f\", $HIT/$TOTAL*100}")
          echo "Coverage: $PCT% ($HIT/$TOTAL lines, minimum ${MIN}%)"
          awk "BEGIN{exit !($PCT+0 >= $MIN)}" || { echo "::error::Coverage $PCT% is below the ${MIN}% minimum"; exit 1; }

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Provision .env (Flutter asset; real config comes from --dart-define)
        run: cp .env.example .env
      - name: Install dependencies
        run: flutter pub get
      - name: Generate l10n
        run: flutter gen-l10n
      - name: Build web
        run: flutter build web --release
