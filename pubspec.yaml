name: my_games_list
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  flutter_bloc: ^9.1.1
  bloc: ^9.0.1
  get_it: ^8.2.0
  go_router: ^16.2.4
  shared_preferences: ^2.5.3
  equatable: ^2.0.7
  validatorless: ^1.2.5
  dio: ^5.9.0
  provider: ^6.1.5+1
  intl: ^0.20.2
  carousel_slider: ^5.1.1
  cached_network_image: ^3.4.1
  stream_transform: ^2.1.1
  flutter_rating_bar: ^4.0.1
  url_launcher: ^6.2.5
  youtube_player_iframe: ^5.2.2
  share_plus: ^10.1.4
  visibility_detector: ^0.4.0+2
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  firebase_crashlytics: ^5.0.8
  firebase_messaging: ^16.1.2
  google_sign_in: ^7.2.0
  flutter_local_notifications: ^20.1.0
  crypto: ^3.0.7
  flutter_secure_storage: ^10.3.1
  connectivity_plus: ^6.1.0
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  generate: true
  uses-material-design: true

  assets:
    - .env
    - assets/legal/

# Launcher icons — generated from the PLACEHOLDER brand art in assets/branding/.
# Regenerate after replacing the source PNGs:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/branding/icon.png"
  android: "ic_launcher"
  adaptive_icon_background: "#12141C"
  adaptive_icon_foreground: "assets/branding/icon_foreground.png"
  min_sdk_android: 21
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/branding/icon.png"
    background_color: "#12141C"
    theme_color: "#12141C"

# Native splash — brand background + centered PLACEHOLDER logo.
# Regenerate after replacing the source PNGs:
#   dart run flutter_native_splash:create
flutter_native_splash:
  color: "#12141C"
  color_dark: "#12141C"
  image: "assets/branding/splash_logo.png"
  image_dark: "assets/branding/splash_logo.png"
  android_12:
    color: "#12141C"
    color_dark: "#12141C"
    image: "assets/branding/splash_logo.png"
    image_dark: "assets/branding/splash_logo.png"
    icon_background_color: "#12141C"
    icon_background_color_dark: "#12141C"
  web: false
